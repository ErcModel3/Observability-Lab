name: lab

mgmt:
  network: lab-mgmt
  ipv4-subnet: 192.168.10.0/24

topology:
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux
      type: ixr-d3

  nodes:
    # Leaves
    core1:
      kind: nokia_srlinux
      mgmt-ipv4: 192.168.10.254
      startup-config: ./configs/core1.cfg
    core2:
      kind: nokia_srlinux
      mgmt-ipv4: 192.168.10.253
      startup-config: ./configs/core2.cfg
    edge1:
      kind: nokia_srlinux
      mgmt-ipv4: 192.168.10.252
      startup-config: ./configs/edge1.cfg
    edge2:
      kind: nokia_srlinux
      mgmt-ipv4: 192.168.10.251
      startup-config: ./configs/edge1.cfg

  links:
    # Inter-Leaf links
    - endpoints: [ "core1:ethernet-1/1", "core2:ethernet-1/1" ]
    - endpoints: [ "core1:ethernet-1/2", "core2:ethernet-1/2" ]
    - endpoints: [ "core1:ethernet-1/3", "edge1:ethernet-1/1" ]
    - endpoints: [ "core1:ethernet-1/4", "edge1:ethernet-1/2" ]
    - endpoints: [ "core1:ethernet-1/5", "edge2:ethernet-1/1" ]
    - endpoints: [ "core1:ethernet-1/6", "edge2:ethernet-1/2" ]
    
    - endpoints: [ "core2:ethernet-1/3", "edge1:ethernet-1/3" ]
    - endpoints: [ "core2:ethernet-1/4", "edge1:ethernet-1/4" ]
    - endpoints: [ "core2:ethernet-1/5", "edge2:ethernet-1/3" ]
    - endpoints: [ "core2:ethernet-1/6", "edge2:ethernet-1/4" ]